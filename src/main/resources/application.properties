spring.application.name=demo

# port configuration
server.port = 9090

# database configuration (mysql)
spring.datasource.url=jdbc:mysql://localhost:3306/event_ticket_booking_db
spring.datasource.username=root
spring.datasource.password=

# optional (not compulsory)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway creates/changes tables
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb.core=DEBUG

# Add Hibernate
# Hibernate checks your entities match the database
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

#Configuring JWT Token
jwt.secret = 2413fb3709b05939f04cf2e92f7d0897fc2596f9ad0b8a9ea855c7bfebaae892
#1 hour in ms
jwt.expiration = 3600000 